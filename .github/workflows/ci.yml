name: idempotweet-workflow

jobs:
  ci-job:
    steps:
      - name: Sjekker ut koden
        uses: actions/checkout

      - name: Sette opp Node.js
        uses: actions/setup-node
        with:
          cache: 'yarn'

      - name: Kjører tester
        uses: yarn test:coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: 1-DevOps/idempotweet
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

    defaults:
      run:
        working-directory: 1-DevOps/idempotweet
    name: 'ci'
    runs-on: ${{ vars.RUNNER || 'self-hosted' }}


on:
  pull_request:
    paths:
      - '1-DevOps/idempotweet/**'