name: idempotweet-workflow

on:
  pull_request:
    paths:
      - '1-DevOps/idempotweet/**'

jobs:
  build:
    defaults:
      run:
        working-directory: 1-DevOps/idempotweet

    runs-on: ${{ vars.RUNNER || 'self-hosted' }}

    steps:
      - name: Sjekker ut koden
        uses: actions/checkout@v4

      - name: Sette opp Node.js
        uses: actions/setup-node@v4

      - name: Kjører tester
        uses: yarn test:coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: 1-DevOps/idempotweet
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}